bio:
  - >
    Я володію глибокими знаннями в сфері комп’ютерних технологій, мереж та кібербезпеки, оскільки розпочав свій кар’єрний шлях ще до того, як інформаційні технології набули сьогоденної глобальної популярності та проникли у всі сфери життя.
    Все своє свідоме життя я присвятив вдосконаленню своїх знань та навичок в галузі інформаційних технологі і маю комерційний досвід, який пов’язаний з величезною кількість технологій, платформ та сфер.
    Я вважаю, що мої знання чудово допоможуть моїй країні в знищенні ворога.
  - >
    Я люблю термінали, мотоцикли, neovim, Python, Golang, C, C++, Go, 3D-графіку, шейдери, Doom, вбудовані технології, ретро-комп'ютери, процесор 6502, статичну типізацію, вільне програмне забезпечення та треш-метал.
features:
  - 10+ років комерційного досвіду з Python та JavaScript
  - 15+ років комерційного досвіду з GNU/Linux
  - C/C++, Golang, Assembly (x86, 6502, AVR), Java (впорядковано по досвіду)
  - СКБД *SQL, Firestore, DynamoDB, MongoDB, BigQuery та інші
  - >
    Комерційний досвід роботи з високонавантаженими розподіленими комп’ютерними системами та хмарними платформами: AWS - 10 років досвіду, GCP - 5 років досвіду
  - Комерційний досвід побудови високодоступних інфраструктур з використанням контейнеризованих систем та оркестраторів (Docker, ECS/EKS, GKE)
  - Комерційний досвід застосування Infrastructure as Code (Terraform Enterprise, CloudFormation, Serverless, GitOps)
  - Комерційний досвід роботи в якості Full-Stack розробника та Tech Lead для невеликих команд розробників (~10 осіб)
  - Комерційний досвід роботи з OpenCV та нейронними мережами (Keras/TensorFlow) для опрацювання та класифікації зображень
  - Комерційний досвід роботи з Генеративним ШІ (Generative AI), Prompt Engineering та Retrieval-Augumented Generation для витягнення даних з великих обсягів документів та автоматизації заповнення форм
  - Комерційний досвід використання та інтеграції алгоритмів симетричної/асиметричної криптографії, цифрових підписів та шифрування даних і повідомлень
  - >
    Комерційний досвід Solution Architecture: формування ТЗ та побудова рішень для бізнесу, створення супутньої дукоментації, автоматизація процесів CI/CD, планування та налаштування моніторингів, навчання команди для подальшого супроводу проєктів
  - Досвід написання чат-ботів для різних месенджерів
  - Досвід розробки та побудови IoT-систем та пристроїв на базі 8-бітних мікропроцесорів та вбудованих SoC-систем (Atmel, ESP8266/ESP32, RPI, 808x, 6502/65816, Z80), а також невеликий досвід програмування ПЛІС
  - Досвід з пошуку прихованих та незахищених ресурсів з використанням відкритих інструментів та OSINT-практик з метою ідентифікації шахраїв та зловмисників
  - Досвід роботи з 3D-рушіями, шейдерами та процедурною генерацією зображень та геометрій
  - >
    Досвід роботи з CAD для проєктування електронних схем, друкованих плат та корпусів: KiCad, LibreCAD та FreeCAD
  - Розвиток сфери Open Source – я є автором багатьох внесків, зокрема в код ядра Linux, офіційний фреймворк ESP32, мову Python (Cpython) та ряд бібліотек і рушіїв (three.js, urwid, qtile, godot)
  - Базові навички радіолюбителя
